<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>계정 탈퇴</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="screen-intro" class="screen active">
    <p>계정을 탈퇴하시겠습니까?</p>
    <button onclick="startFlow()">예</button>
    <button onclick="exit()">아니오</button>
  </div>

  <div id="screen-confirm" class="screen">
    <p id="confirm-text">정말 탈퇴하시겠습니까?</p>
    <div id="buttons">
      <button id="yes-btn" onclick="nextConfirm()">예</button>
      <button id="no-btn" onclick="exit()">아니오</button>
    </div>
  </div>

  <div id="screen-loading" class="screen">
    <p id="loading-text">계정을 삭제하는 중입니다...</p>
    <progress id="loading-bar" value="0" max="100"></progress>
    <p id="loading-percent">0%</p>
  </div>

  <div id="screen-done" class="screen">
    <p>탈퇴가 완료되었습니다</p>
  </div>

  <div id="screen-ending" class="screen">
    <p id="ending-time"></p>
    <p>탈퇴하는 데 이만큼의 시간이 필요했나요?</p>
    <button onclick="restart()">처음으로</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
